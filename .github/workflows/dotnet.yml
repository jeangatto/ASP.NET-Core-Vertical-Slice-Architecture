# https://github.com/actions/setup-dotnet
name: Build

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      - "**/*.yml"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: build-and-test-${{matrix.os}}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Blog.slnx

      - name: Build
        run: dotnet build Blog.slnx --nologo --no-restore --configuration Release

      - name: Test
        run: dotnet test Blog.slnx --nologo --no-build --no-restore --configuration Release --verbosity minimal
